name: 💡 Feature request
description: An idea or suggestion to make Twine Peeks better
labels: [enhancement]
body:
  - type: textarea
    id: idea
    attributes:
      label: What would you like to see?
      description: Describe the feature or improvement, and what you'd use it for.
    validations:
      required: true
  - type: input
    id: game-info
    attributes:
      label: Game / story format
      description: If this relates to a specific game or format, which one?
      placeholder: e.g. Harlowe 3 games
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: Auto-filled when you suggest from inside the extension — feel free to remove if not relevant.
      render: text
